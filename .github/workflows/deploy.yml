name: Deploy Vládoměr

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a run (incl. evaluation) by hand
  schedule:
    - cron: "0 9 * * 5"     # every Friday 09:00 UTC

permissions:
  contents: write           # to commit the refreshed evaluations.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Run the AI evaluation only on the Friday schedule or a manual run,
      # not on ordinary code pushes. Needs the ANTHROPIC_API_KEY repo secret.
      - name: Weekly AI evaluation
        if: ${{ github.event_name != 'push' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run evaluate

      - name: Commit refreshed evaluations
        if: ${{ github.event_name != 'push' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/evaluations.json
          git commit -m "chore: weekly evaluation $(date -u +%F)" || echo "no changes"
          git push || echo "nothing to push"

      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
